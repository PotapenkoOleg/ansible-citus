#    - name: Remove Old DATA Directory
#      ansible.builtin.shell: "rm -rf /opt/postgres/17/data/*"

    - name: Enable And Start Postgres Service
      ansible.builtin.service:
        name: postgresql-{{ NEW_POSTGRES_VERSION }}
        enabled: no
    - name: Enable And Start Patroni Service
      ansible.builtin.service:
        name: patroni
        enabled: yes
        state: started
    - name: Disable And Stop Postgres {{ OLD_POSTGRES_VERSION }} Service
      ansible.builtin.service:
        name: postgresql-{{ OLD_POSTGRES_VERSION }}
        state: stopped
        enabled: no
    - name: Remove old cluster
      ansible.builtin.shell: "bash {{ POSTGRES_ROOT_DIRECTORY }}/{{ NEW_POSTGRES_VERSION }}/data/delete_old_cluster.sh"
      args:
        chdir: "{{ POSTGRES_ROOT_DIRECTORY }}/{{ NEW_POSTGRES_VERSION }}/data"
    - name: Remove Unused DATA Directory
      ansible.builtin.shell: "rm -rf {{ POSTGRES_DEFAULT_DIRECTORY }}/{{ NEW_POSTGRES_VERSION }}"
    - name: Remove Old DATA Directory
      ansible.builtin.shell: "rm -rf {{ POSTGRES_DEFAULT_DIRECTORY }}/{{ OLD_POSTGRES_VERSION }}"
    - name: Remove Old PG Cron
      ansible.builtin.dnf:
        name: pg_cron_{{ OLD_POSTGRES_VERSION }}
        state: absent
    - name: Remove Old PG Jobmon
      ansible.builtin.dnf:
        name: pg_jobmon_{{ OLD_POSTGRES_VERSION }}
        state: absent
    - name: Remove Old PG Partman
      ansible.builtin.dnf:
        name: pg_partman_{{ OLD_POSTGRES_VERSION }}
        state: absent
    - name: Remove Old Citus
      ansible.builtin.dnf:
        name: citus121_{{ OLD_POSTGRES_VERSION }}
        state: absent
    - name: Remove old service directory
      ansible.builtin.shell: "rm -rf /etc/systemd/system/postgresql-{{ OLD_POSTGRES_VERSION }}.service"
    - name: Remove old service directory
      ansible.builtin.shell: "rm -rf /etc/systemd/system/postgresql-{{ OLD_POSTGRES_VERSION }}.service.d"
    # TODO: NEW!!! Documentation suggest to run on all nodes. Previously coordinator only
    # https://learn.microsoft.com/en-us/postgresql/citus/upgrade-citus?view=citus-14
    - name: Finish Upgrade
      ansible.builtin.shell: psql -U postgres -d {{ CLUSTER_NAME }} -c "SELECT citus_finish_pg_upgrade();"
      become_user: postgres
