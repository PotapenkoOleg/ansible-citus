---
- name: Clean Patroni File
  hosts: all
  become: yes
  vars:
    OLD_POSTGRES_VERSION: "16"
    NEW_POSTGRES_VERSION: "17"
    POSTGRES_ROOT_DIR: "/opt/postgres"
    POSTGRES_DEFAULT_DIR: "/var/lib/pgsql"
  tasks:
#    - name: Remove Patroni Config
#      ansible.builtin.shell: "rm -f /etc/patroni/dev-citus.{{ OLD_POSTGRES_VERSION }}.yml"
#    - name: Backup Patroni Config
#      ansible.builtin.shell: "cp /etc/patroni/dev-citus.yml /etc/patroni/dev-citus.{{ OLD_POSTGRES_VERSION }}.yml"
    - name: Remove log_directory
      ansible.builtin.lineinfile:
        path: "/opt/postgres/{{NEW_POSTGRES_VERSION}}/data/postgresql.conf"
        regexp: 'log_directory'
        state: absent
    - name: Remove 1
      ansible.builtin.lineinfile:
        path: "/opt/postgres/{{NEW_POSTGRES_VERSION}}/data/postgresql.conf"
        regexp: 'log_filename'
        state: absent
    - name: Remove 1
      ansible.builtin.lineinfile:
        path: "/opt/postgres/{{NEW_POSTGRES_VERSION}}/data/postgresql.conf"
        regexp: 'logging_collector'
        state: absent
    - name: Remove 2
      ansible.builtin.lineinfile:
        path: "/opt/postgres/{{NEW_POSTGRES_VERSION}}/data/postgresql.conf"
        regexp: 'logging_collector'
        state: absent
    - name: Remove 2
      ansible.builtin.lineinfile:
        path: "/opt/postgres/{{NEW_POSTGRES_VERSION}}/data/postgresql.conf"
        regexp: 'shared_preload_libraries'
        state: absent

...