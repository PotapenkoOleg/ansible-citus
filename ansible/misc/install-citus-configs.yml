---
- name: Update pg_hba
  hosts: workers
  become: yes
  tasks:
    - name: Backup Current Config
      ansible.builtin.shell: "rm -rf /opt/postgres/16/data/pg_hba.conf"
    - name: Create New Config
      ansible.builtin.shell: "touch /opt/postgres/16/data/pg_hba.conf"
    - name: Add access
      ansible.builtin.blockinfile:
        path: "/opt/postgres/16/data/pg_hba.conf"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # TYPE  DATABASE        USER            ADDRESS                 METHOD
          
          # "local" is for Unix domain socket connections only
          local   all             all                                     trust
          # IPv4 local connections (pg_cron):
          host    all             all             127.0.0.1/32            trust
          # IPv6 local connections:
          host    all             all             ::1/128                 trust
          # Citus
          # Coordinators
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          # Primary Site
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          # Disaster Recovery Site
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    all             all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          host    replication     all            host.localdomain.local trust
          # Local Domain Class A
          host    all             all             127.0.0.1/8              scram-sha-256
          # Jump Server Range
          host    all             all             127.0.0.1/16           scram-sha-256
        state: "present"
    - name: Restart Postgres Service
      ansible.builtin.service:
        name: postgresql-16
        state: restarted
...