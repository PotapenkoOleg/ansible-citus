---
- name: Install Patroni
  hosts: patroni_servers
  become: yes
  #  var_files:
  #    - cluster-settings.yml # TODO: Replace with content of cluster-settings.yml
  vars:
    CLUSTER_NAME: "constellation_v18" # TODO: Change this to the actual cluster name
    # ETCD SETTINGS
    ETCD_MAJOR_VERSION: "3"
    ETCD_MINOR_VERSION: "6"
    ETCD_PATCH_VERSION: "11"
    ETCD_VERSION: "v{{ ETCD_MAJOR_VERSION }}.{{ ETCD_MINOR_VERSION }}.{{ ETCD_PATCH_VERSION }}"
    ETCD_DOWNLOAD_URL: "https://github.com/etcd-io/etcd/releases/download"
    ETCD_TAR_FILE: "{{ ETCD_DIRECTORY }}/etcd-{{ ETCD_VERSION }}-linux-amd64.tar.gz"
    ETCD_CLUSTER_NAME: "{{ CLUSTER_NAME }}"
    ETCD_DIRECTORY: "/opt/etcd/{{ ETCD_VERSION }}" # TODO: Change this to the actual etcd directory
    ETCD_PEER_URLS_PORT: "2480" # TODO: Change this to the actual peer URLs port
    ETCD_CLIENT_URLS_PORT: "2479" # TODO: Change this to the actual client URLs port
    # HAPROXY SETTINGS
    HAPROXY_MAX_CONNECTIONS: "1000"
    HAPROXY_POSTGRES_PORT: "5100" # TODO: Change this to the actual postgres port
    HAPROXY_POSTGRES_READONLY_PORT: "5101" # TODO: Change this to the actual postgres readonly port
    HAPROXY_STATISTICS_PORT: "9001"
    HAPROXY_DMA_PORT: "9301"
    # POSTGRES SETTINGS
    POSTGRES_VERSION: "18"
    POSTGRES_DEFAULT_PORT: "5433" # TODO: Change this to the actual default port
    # POSTGRES DIRECTORIES
    POSTGRES_ROOT_DIRECTORY: "/opt/postgres" # TODO: Change this to the actual postgres directory
    POSTGRES_DEFAULT_DIRECTORY: "/var/lib/pgsql/"
    POSTGRES_BIN_DIRECTORY: "/usr/pgsql-{{ POSTGRES_VERSION }}/bin"
    POSTGRES_DATA_DIRECTORY: "{{ POSTGRES_ROOT_DIRECTORY }}/{{ POSTGRES_VERSION }}/data"
    POSTGRES_LOG_DIRECTORY: "{{ POSTGRES_ROOT_DIRECTORY }}/{{ POSTGRES_VERSION }}/log"
    # POSTGRES ADMIN USERS AND PASSWORDS
    POSTGRES_SUPERUSER_USERNAME: "postgres"
    POSTGRES_SUPERUSER_PASSWORD: "postgres" # TODO: Change this to a secure password
    POSTGRES_REPLICATION_USERNAME: "rep_user"
    POSTGRES_REPLICATION_PASSWORD: "postgres" # TODO: Change this to a secure password
    POSTGRES_REWIND_USERNAME: "rep_user"
    POSTGRES_REWIND_PASSWORD: "postgres" # TODO: Change this to a secure password
    # CITUS VERSION
    CITUS_MAJOR_VERSION: "14"
    CITUS_MINOR_VERSION: "0"
    CITUS_PATCH_VERSION: "1"
    CITUS_VERSION: "{{ CITUS_MAJOR_VERSION }}{{ CITUS_MINOR_VERSION }}{{ CITUS_PATCH_VERSION }}"
    # PYTHON
    # PYTHON 3.9 IS DEFAULT for ALMA LINUX 9
    PYTHON_MAJOR_VERSION: "3"
    PYTHON_MINOR_VERSION: "9"
    PYTHON_VERSION: "{{ PYTHON_MAJOR_VERSION }}{{ PYTHON_MINOR_VERSION }}"
    # PATRONI SETTINGS
    PATRONI_CLUSTER_NAME: "{{ CLUSTER_NAME }}"
    PATRONI_CITUS_DB_NAME: "{{ CLUSTER_NAME }}" # TODO: Change this to the actual distributed database name
    PATRONI_API_PORT: "8009" # TODO: Change this to the actual API port
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
    # PATRONI DIRECTORIES
    PATRONI_DOWNLOAD_URL: "https://github.com/patroni/patroni/archive/refs/tags/{{ PATRONI_VERSION }}.tar.gz"
    PATRONI_DIRECTORY: "/opt/patroni/{{ PATRONI_VERSION }}"
    PATRONI_TAR_FILE: "{{ PATRONI_DIRECTORY }}/patroni-{{ PATRONI_VERSION }}.tar.gz"
    # PATRONI JUMP SERVER
    JUMP_SERVER_IP: "127.0.0.1" # TODO: Change this to the actual jump server IP
  tasks:
    - name: Create patroni group
      group:
        name: patroni
        system: yes
    - name: Create patroni
      user:
        name: patroni
        group: patroni
        system: yes
        shell: "/sbin/nologin"
    - name: Install Python
      ansible.builtin.dnf:
        name: python{{ PYTHON_VERSION }}
        state: latest
    - name: Install pip
      ansible.builtin.dnf:
        name: pip
        state: latest
    - name: Install psycopg2
      ansible.builtin.dnf:
        name: python{{ PYTHON_MAJOR_VERSION }}-psycopg2
        state: latest
    - name: Install pyyaml
      ansible.builtin.dnf:
        name: python{{ PYTHON_MAJOR_VERSION }}-pyyaml
        state: latest
    - name: Create patroni extract directory
      file:
        path: "{{ PATRONI_DIRECTORY }}"
        state: directory
        mode: '0755'
        owner: postgres
        group: postgres
        recurse: yes
    - name: Download patroni tarball
      get_url:
        url: "{{ PATRONI_DOWNLOAD_URL }}"
        dest: "{{ PATRONI_TAR_FILE }}"
    - name: Extract patroni tarball
      unarchive:
        src: "{{ PATRONI_TAR_FILE }}"
        dest: "{{ PATRONI_DIRECTORY }}"
        remote_src: yes
        extra_opts:
          - --strip-components=1
          - --no-same-owner
    - name: Remove patroni tarball after extraction
      file:
        path: "{{ PATRONI_TAR_FILE }}"
        state: absent
    - name: Install patroni using pip
      pip:
        chdir: "{{ PATRONI_DIRECTORY }}"
        name: patroni[psycopg3,etcd3,systemd]
        state: present
    - name: Load softdog kernel module
      ansible.builtin.command: modprobe softdog
    - name: change permissions of /dev/watchdog
      ansible.builtin.file:
        path: /dev/watchdog
        owner: postgres
        group: postgres
        mode: '0750' #
    - name: Create patroni config directory
      file:
        path: "/etc/patroni"
        state: directory
        mode: '0755'
        owner: postgres
        group: postgres
        recurse: yes
    - name: Config File Template
      template:
        src: patroni.config.yml.j2
        dest: /etc/patroni/{{ PATRONI_CLUSTER_NAME }}.yml
        owner: postgres
        group: postgres
        mode: '0644'
    - name: Service File Template
      template:
        src: patroni.service.j2
        dest: /etc/systemd/system/patroni{{ PATRONI_VERSION }}.service
        owner: patroni
        group: patroni
        mode: '0644'
    - name: Reload systemd to recognize service
      systemd:
        daemon_reload: yes
- name: Start Patroni Service on COORDINATORS PRIMARY
  hosts: coordinators_primary
  become: yes
  vars:
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
  tasks:
    - name: Start Patroni Service
      ansible.builtin.service:
        name: patroni{{ PATRONI_VERSION }}
        state: started
- name: Start Patroni Service on COORDINATORS DR
  hosts: coordinators_dr
  become: yes
  vars:
    POSTGRES_VERSION: "18" # TODO: Change this to the actual Postgres version
    POSTGRES_ROOT_DIRECTORY: "/opt/postgres" # TODO: Change this to the actual postgres directory
    POSTGRES_DATA_DIRECTORY: "{{ POSTGRES_ROOT_DIRECTORY }}/{{ POSTGRES_VERSION }}/data"
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
  tasks:
    - name: Remove Old Data Directory
      ansible.builtin.shell: "rm -rf {{ POSTGRES_DATA_DIRECTORY }}"
    - name: Start Patroni Service
      ansible.builtin.service:
        name: patroni{{ PATRONI_VERSION }}
        state: started
- name: Start Patroni Service on WORKERS PRIMARY
  hosts: workers_primary
  become: yes
  vars:
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
  tasks:
    - name: Start Patroni Service
      ansible.builtin.service:
        name: patroni{{ PATRONI_VERSION }}
        state: started
- name: Start Patroni Service on WORKERS DR
  hosts: workers_dr
  become: yes
  vars:
    POSTGRES_VERSION: "18"  # TODO: Change this to the actual Postgres version
    POSTGRES_ROOT_DIRECTORY: "/opt/postgres" # TODO: Change this to the actual postgres directory
    POSTGRES_DATA_DIRECTORY: "{{ POSTGRES_ROOT_DIRECTORY }}/{{ POSTGRES_VERSION }}/data"
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
  tasks:
    - name: Remove Old Data Directory
      ansible.builtin.shell: "rm -rf {{ POSTGRES_DATA_DIRECTORY }}"
    - name: Start Patroni Service
      ansible.builtin.service:
        name: patroni{{ PATRONI_VERSION }}
        state: started
- name: Enable Patroni
  hosts: patroni_servers
  become: yes
  vars:
    # PATRONI VERSION
    PATRONI_MAJOR_VERSION: "4"
    PATRONI_MINOR_VERSION: "1"
    PATRONI_PATCH_VERSION: "3"
    PATRONI_VERSION: "v{{PATRONI_MAJOR_VERSION}}.{{PATRONI_MINOR_VERSION}}.{{PATRONI_PATCH_VERSION}}"
  tasks:
    - name: Enable patroni service
      systemd:
        name: patroni{{ PATRONI_VERSION }}
        enabled: yes
...